# Database Configuration
spring.datasource.url=jdbc:derby:bookbyte;create=true
spring.datasource.driver-class-name=org.apache.derby.jdbc.EmbeddedDriver
spring.datasource.username=bookbyte
spring.datasource.password=bookbyte

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.DerbyDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=bookbyteSecretKey2024ForJWTTokenGenerationAndValidation
jwt.expiration=86400000

# Logging Configuration
logging.level.com.bookbyte=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB